name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  PYTHONUTF8: "1"

jobs:
  build-macos:
    name: macOS (dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare icons
        run: python scripts/prepare_icons.py

      - name: Download ffmpeg
        run: python scripts/download_ffmpeg.py

      - name: Build updater
        run: pyinstaller --clean --noconfirm Updater.spec

      - name: Build app
        run: pyinstaller --clean --noconfirm VideoDownload.spec

      - name: Bundle updater into app
        run: cp dist/VideoDownloadUpdater dist/VideoDownload.app/Contents/MacOS/

      - name: Create DMG
        run: |
          hdiutil create -volname "VideoDownload" \
            -srcfolder dist/VideoDownload.app \
            -ov -format UDZO dist/VideoDownload.dmg

      - name: Create app zip for updater
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent VideoDownload.app VideoDownload.app.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VideoDownload-macOS
          path: |
            dist/VideoDownload.dmg
            dist/VideoDownload.app
            dist/VideoDownload.app.zip
          if-no-files-found: error

  build-windows:
    name: Windows (exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare icons
        run: python scripts/prepare_icons.py

      - name: Download ffmpeg
        run: python scripts/download_ffmpeg.py

      - name: Build updater
        run: pyinstaller --clean --noconfirm Updater.spec

      - name: Build exe
        run: pyinstaller --clean --noconfirm VideoDownload.spec

      - name: Package Windows folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/VideoDownload | Out-Null
          Move-Item -Force dist/VideoDownload.exe dist/VideoDownload/
          Move-Item -Force dist/VideoDownloadUpdater.exe dist/VideoDownload/
          Compress-Archive -Path dist/VideoDownload -DestinationPath dist/VideoDownload-Windows.zip -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VideoDownload-Windows
          path: |
            dist/VideoDownload
            dist/VideoDownload-Windows.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: VideoDownload-macOS
          path: release/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: VideoDownload-Windows
          path: release/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/macos/VideoDownload.dmg
            release/macos/VideoDownload.app.zip
            release/windows/VideoDownload-Windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
